name: CI/CD📦

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COSIGN_VERSION: "3.0.5"
  BUILDX_VERSION: "0.32.1"
  BUILDKIT_VERSION: "0.28.0"
  MINT_VERSION: "1.41.8"
  DIVE_VERSION: "0.13.1"
  GRYPE_VERSION: "0.109.0"
  SYFT_VERSION: "1.42.1"
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: quiet
  # BUILDKIT_PROGRESS: plain

jobs:
  build:
    if: github.actor == 'ammnt'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.digest.outputs.digest }}

    steps:
      - name: Checkout repository📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Load .env variables☁️
        run: |
          while IFS= read -r line; do
            if [[ ! "$line" =~ ^# ]] && [[ -n "$line" ]]; then
              echo "$line" >> $GITHUB_ENV
            fi
          done < .env
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_ENV
          echo "VCS_REF=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Install Cosign🔐
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad
        with:
          cosign-release: v${{ env.COSIGN_VERSION }}

      - name: Setup Docker Buildx🏗️
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        with:
          version: v${{ env.BUILDX_VERSION }}
          driver-opts: image=moby/buildkit:v${{ env.BUILDKIT_VERSION }}-rootless

      - name: Build Docker image🐳
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_CHECKS_ANNOTATIONS: false
          DOCKER_CONTENT_TRUST: 1
        with:
          provenance: false
          context: .
          file: ./Dockerfile.template
          platforms: linux/amd64
          load: true
          tags: ghcr.io/ammnt/nginx:${{ env.APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_VERSION=${{ env.BASE_VERSION }}
            BASE_HASH=${{ env.BASE_HASH }}
            OPENSSL_VERSION=${{ env.OPENSSL_VERSION }}
            APP_VERSION=${{ env.APP_VERSION }}
            PCRE_VERSION=${{ env.PCRE_VERSION }}
            ZLIB_VERSION=${{ env.ZLIB_VERSION }}
            ZSTD_VERSION=${{ env.ZSTD_VERSION }}
            VCS_REF=${{ env.VCS_REF }}
            UID=${{ env.UID }}
            GID=${{ env.GID }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Slim image with Mint🔧
        run: |
          curl -sSL -o ds.tar.gz https://github.com/mintoolkit/mint/releases/download/${{ env.MINT_VERSION }}/dist_linux.tar.gz
          tar -xf ds.tar.gz
          ./dist_linux/mint --quiet build \
            --target ghcr.io/ammnt/nginx:${{ env.APP_VERSION }} \
            --tag ghcr.io/ammnt/nginx:${{ env.APP_VERSION }} \
            --http-probe=false --continue-after=5 \
            --include-path=/etc/shadow --include-path=/etc/group

      - name: Get image digest🔢
        id: digest
        run: |
          DIGEST=$(docker inspect -f='{{index .RepoDigests 0}}' ghcr.io/ammnt/nginx:${{ env.APP_VERSION }} | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

  security-scans:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        scanner: [hadolint, dive, dockle, scout, trivy, grype, snyk, syft]
      fail-fast: false
    steps:
      - name: Lint Dockerfile with Hadolint🔍
        if: matrix.scanner == 'hadolint'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: Dockerfile.template
          format: sarif
          output-file: hadolint.sarif
          config: ./hadolint.yaml

      - name: Explore with Dive🔍
        if: matrix.scanner == 'dive'
        env:
          CI: true
        run: |
          wget -q https://github.com/wagoodman/dive/releases/download/v${{ env.DIVE_VERSION }}/dive_${{ env.DIVE_VERSION }}_linux_amd64.tar.gz
          tar xzf dive_${{ env.DIVE_VERSION }}_linux_amd64.tar.gz -C /usr/local/bin
          dive --config ./dive-ci.yml ghcr.io/ammnt/nginx:${{ env.APP_VERSION }}

      - name: Dockle scan🛡️
        if: matrix.scanner == 'dockle'
        uses: goodwithtech/dockle-action@e30e6af832aad6ea7dca2a248d31a85eab6dbd68
        with:
          image: ghcr.io/ammnt/nginx:${{ env.APP_VERSION }}
          exit-code: "1"
          exit-level: "warn"
          ignore: "CIS-DI-0010"

      - name: Docker Scout scan🛡️
        if: matrix.scanner == 'scout'
        uses: docker/scout-action@f8c776824083494ab0d56b8105ba2ca85c86e4de
        with:
          command: cves,sbom
          image: ghcr.io/ammnt/nginx:${{ env.APP_VERSION }}
          sarif-file: scout.sarif
          write-comment: true
          summary: false
          exit-code: true
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Trivy scan🛡️
        if: matrix.scanner == 'trivy'
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518
        with:
          image-ref: ghcr.io/ammnt/nginx:${{ env.APP_VERSION }}
          scan-type: image
          format: sarif
          output: trivy.sarif
          severity: "MEDIUM,HIGH,CRITICAL"
          scanners: "vuln,secret"
          exit-code: "1"
          github-pat: ${{ secrets.GH_TOKEN }}

      - name: Grype scan🛡️
        if: matrix.scanner == 'grype'
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c
        with:
          image: ghcr.io/ammnt/nginx:${{ env.APP_VERSION }}
          fail-build: false
          severity-cutoff: critical
          output-format: sarif
          grype-version: v${{ env.GRYPE_VERSION }}
          output-file: grype.sarif

      - name: Snyk scan🛡️
        if: matrix.scanner == 'snyk'
        continue-on-error: true
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/ammnt/nginx:${{ env.APP_VERSION }}
          sarif: true
          args: --file=Dockerfile.template --sarif-file-output=snyk.sarif

      - name: Generate SBOM with Syft📋
        if: matrix.scanner == 'syft'
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11
        with:
          syft-version: v${{ env.SYFT_VERSION }}
          image: ghcr.io/ammnt/nginx:${{ env.APP_VERSION }}
          format: cyclonedx-json
          upload-artifact: true
          dependency-snapshot: true
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Upload ${{ matrix.scanner }} report📁
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ matrix.scanner }}-report
          path: |
            *.sarif
            *.json
            *.spdx
            *.cyclonedx

  finalize:
    needs: [build, security-scans]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Login to GHCR🔑
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Login to Docker Hub🔑
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push images to registries🚚
        run: |
          docker tag ghcr.io/ammnt/nginx:${{ env.APP_VERSION }} ghcr.io/ammnt/nginx:latest
          docker tag ghcr.io/ammnt/nginx:${{ env.APP_VERSION }} ammnt/nginx:${{ env.APP_VERSION }}
          docker tag ghcr.io/ammnt/nginx:${{ env.APP_VERSION }} ammnt/nginx:latest
          docker push ghcr.io/ammnt/nginx --all-tags
          docker push ammnt/nginx --all-tags

      - name: Attest image provenance📜
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true
          show-summary: false
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Sign container images✍️
        continue-on-error: true
        env:
          COSIGN_EXPERIMENTAL: "true"
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign -y --key env://COSIGN_KEY ghcr.io/ammnt/nginx@${{ needs.build.outputs.digest }}
          cosign sign -y --key env://COSIGN_KEY ammnt/nginx@${{ needs.build.outputs.digest }}
          docker system prune -f ; rm -rf ${{ github.workspace }}/*
