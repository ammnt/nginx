name: CI/CD📦

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COSIGN_VERSION: "3.0.5"
  BUILDX_VERSION: "0.32.1"
  BUILDKIT_VERSION: "0.28.1"
  MINT_VERSION: "1.41.8"
  DIVE_VERSION: "0.13.1"
  GRYPE_VERSION: "0.110.0"
  SYFT_VERSION: "1.42.3"
  TRIVY_VERSION: "0.69.3"
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: quiet
  # BUILDKIT_PROGRESS: plain

jobs:
  build:
    if: github.actor == 'ammnt'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      app_version: ${{ steps.load_env.outputs.APP_VERSION }}
      base_version: ${{ steps.load_env.outputs.BASE_VERSION }}
      base_hash: ${{ steps.load_env.outputs.BASE_HASH }}
      openssl_version: ${{ steps.load_env.outputs.OPENSSL_VERSION }}
      pcre_version: ${{ steps.load_env.outputs.PCRE_VERSION }}
      zlib_version: ${{ steps.load_env.outputs.ZLIB_VERSION }}
      zstd_version: ${{ steps.load_env.outputs.ZSTD_VERSION }}
      uid: ${{ steps.load_env.outputs.UID }}
      gid: ${{ steps.load_env.outputs.GID }}
      build_date: ${{ steps.load_env.outputs.BUILD_DATE }}
      vcs_ref: ${{ steps.load_env.outputs.VCS_REF }}

    steps:
      - name: Checkout repository📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Load .env variables☁️
        id: load_env
        run: |
          while IFS= read -r line; do
            if [[ ! "$line" =~ ^# ]] && [[ -n "$line" ]]; then
              key="${line%%=*}"
              value="${line#*=}"
              echo "$key=$value" >> $GITHUB_OUTPUT
            fi
          done < .env
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_OUTPUT
          echo "VCS_REF=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Login to GHCR🔑
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Setup Docker Buildx🏗️
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
        with:
          version: v${{ env.BUILDX_VERSION }}
          driver-opts: image=moby/buildkit:v${{ env.BUILDKIT_VERSION }}-rootless

      - name: Build Docker image🐳
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_CHECKS_ANNOTATIONS: false
          DOCKER_CONTENT_TRUST: 1
        with:
          provenance: false
          context: .
          file: ./Dockerfile.template
          platforms: linux/amd64
          load: true
          tags: ghcr.io/ammnt/nginx:${{ steps.load_env.outputs.APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_VERSION=${{ steps.load_env.outputs.BASE_VERSION }}
            BASE_HASH=${{ steps.load_env.outputs.BASE_HASH }}
            OPENSSL_VERSION=${{ steps.load_env.outputs.OPENSSL_VERSION }}
            APP_VERSION=${{ steps.load_env.outputs.APP_VERSION }}
            PCRE_VERSION=${{ steps.load_env.outputs.PCRE_VERSION }}
            ZLIB_VERSION=${{ steps.load_env.outputs.ZLIB_VERSION }}
            ZSTD_VERSION=${{ steps.load_env.outputs.ZSTD_VERSION }}
            VCS_REF=${{ steps.load_env.outputs.VCS_REF }}
            UID=${{ steps.load_env.outputs.UID }}
            GID=${{ steps.load_env.outputs.GID }}
            BUILD_DATE=${{ steps.load_env.outputs.BUILD_DATE }}

      - name: Slim and push image with Mint🔧
        run: |
          curl -sSL -o ds.tar.gz https://github.com/mintoolkit/mint/releases/download/${{ env.MINT_VERSION }}/dist_linux.tar.gz
          tar -xf ds.tar.gz
          ./dist_linux/mint --quiet build \
            --target ghcr.io/ammnt/nginx:${{ steps.load_env.outputs.APP_VERSION }} \
            --tag ghcr.io/ammnt/nginx:${{ steps.load_env.outputs.APP_VERSION }} \
            --tag ghcr.io/ammnt/nginx:latest \
            --http-probe=false --continue-after=5 \
            --include-path=/etc/shadow --include-path=/etc/group
          docker push ghcr.io/ammnt/nginx --all-tags

      - name: Upload Mint report📁
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: mint-report
          path: slim.report.json

      - name: Get image digest🔢
        id: digest
        run: |
          DIGEST=$(docker inspect -f='{{index .RepoDigests 0}}' ghcr.io/ammnt/nginx:${{ steps.load_env.outputs.APP_VERSION }} | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

  security-scans:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
      packages: write
      id-token: write
    strategy:
      matrix:
        scanner: [hadolint, dive, dockle, scout, trivy, grype, snyk, syft]
      fail-fast: false
    steps:
      - name: Checkout repository📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Login to Docker Hub🔑
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Lint Dockerfile with Hadolint🔍
        if: matrix.scanner == 'hadolint'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: Dockerfile.template
          format: sarif
          output-file: hadolint.sarif
          config: ./hadolint.yaml

      - name: Explore with Dive🔍
        if: matrix.scanner == 'dive'
        env:
          CI: true
        run: |
          docker pull ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          wget -q https://github.com/wagoodman/dive/releases/download/v${{ env.DIVE_VERSION }}/dive_${{ env.DIVE_VERSION }}_linux_amd64.tar.gz
          tar xzf dive_${{ env.DIVE_VERSION }}_linux_amd64.tar.gz -C /usr/local/bin
          dive --config ./dive-ci.yml ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}

      - name: Dockle scan🛡️
        if: matrix.scanner == 'dockle'
        uses: goodwithtech/dockle-action@e30e6af832aad6ea7dca2a248d31a85eab6dbd68
        with:
          image: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          exit-code: "1"
          exit-level: "warn"
          ignore: "CIS-DI-0010"

      - name: Docker Scout scan🛡️
        if: matrix.scanner == 'scout'
        uses: docker/scout-action@8910519cee8ac046f3ee99686b0dc6654d5ba1a7
        with:
          command: cves,sbom
          image: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          sarif-file: scout.sarif
          write-comment: true
          summary: false
          exit-code: true
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Trivy scan🛡️
        if: matrix.scanner == 'trivy'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          scan-type: image
          format: sarif
          output: trivy.sarif
          severity: "MEDIUM,HIGH,CRITICAL"
          scanners: "vuln,secret"
          exit-code: "1"
          github-pat: ${{ secrets.GH_TOKEN }}
          version: v${{ env.TRIVY_VERSION }}
          trivy-config: trivy.yaml

      - name: Grype scan🛡️
        if: matrix.scanner == 'grype'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          image: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          fail-build: false
          severity-cutoff: critical
          output-format: sarif
          grype-version: v${{ env.GRYPE_VERSION }}
          output-file: grype.sarif

      - name: Snyk scan🛡️
        if: matrix.scanner == 'snyk'
        continue-on-error: true
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          sarif: true
          args: --file=Dockerfile.template --sarif-file-output=snyk.sarif

      - name: Generate SBOM with Syft📋
        if: matrix.scanner == 'syft'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          syft-version: v${{ env.SYFT_VERSION }}
          image: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          format: cyclonedx-json
          upload-artifact: true
          dependency-snapshot: true
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Upload ${{ matrix.scanner }} report📁
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ matrix.scanner }}-report
          path: |
            *.sarif
            *.json
            *.spdx
            *.cyclonedx

      - name: Upload SARIF to Code Scanning🔬
        if: hashFiles('*.sarif') != ''
        uses: github/codeql-action/upload-sarif@0c0c5dc2f136b98cb0537075ccfa21f94cd9a63e
        with:
          sarif_file: .
          category: ${{ matrix.scanner }}

  finalize:
    needs: [build, security-scans]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Install Cosign🔐
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003
        with:
          cosign-release: v${{ env.COSIGN_VERSION }}

      - name: Login to GHCR🔑
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Login to Docker Hub🔑
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push images to Docker Hub🚚
        run: |
          docker pull ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          docker tag ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }} ammnt/nginx:${{ needs.build.outputs.app_version }}
          docker tag ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }} ammnt/nginx:latest
          docker push ammnt/nginx --all-tags

      - name: Attest image provenance📜
        # continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true
          show-summary: false
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Sign container images✍️
        # continue-on-error: true
        env:
          COSIGN_EXPERIMENTAL: "true"
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign -y --key env://COSIGN_KEY ghcr.io/ammnt/nginx@${{ needs.build.outputs.digest }}
          cosign sign -y --key env://COSIGN_KEY ammnt/nginx@${{ needs.build.outputs.digest }}
          docker system prune -f ; rm -rf ${{ github.workspace }}/*
