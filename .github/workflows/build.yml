name: CI/CD📦

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: quiet
  # BUILDKIT_PROGRESS: plain

jobs:
  build:
    if: github.actor == 'ammnt'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      app_version: ${{ steps.load_env.outputs.APP_VERSION }}
      base_version: ${{ steps.load_env.outputs.BASE_VERSION }}
      base_hash: ${{ steps.load_env.outputs.BASE_HASH }}
      openssl_version: ${{ steps.load_env.outputs.OPENSSL_VERSION }}
      build_date: ${{ steps.load_env.outputs.BUILD_DATE }}
      vcs_ref: ${{ steps.load_env.outputs.VCS_REF }}
      cosign_version: ${{ steps.load_env.outputs.COSIGN_VERSION }}
      buildx_version: ${{ steps.load_env.outputs.BUILDX_VERSION }}
      buildkit_version: ${{ steps.load_env.outputs.BUILDKIT_VERSION }}
      mint_version: ${{ steps.load_env.outputs.MINT_VERSION }}
      dive_version: ${{ steps.load_env.outputs.DIVE_VERSION }}
      grype_version: ${{ steps.load_env.outputs.GRYPE_VERSION }}
      syft_version: ${{ steps.load_env.outputs.SYFT_VERSION }}
      trivy_version: ${{ steps.load_env.outputs.TRIVY_VERSION }}
      checkov_version: ${{ steps.load_env.outputs.CHECKOV_VERSION }}

    steps:
      - name: Checkout repository📥
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Load .env variables☁️
        id: load_env
        run: |
          while IFS= read -r line; do
            if [[ ! "$line" =~ ^# ]] && [[ -n "$line" ]]; then
              key="${line%%=*}"
              value="${line#*=}"
              echo "$key=$value" >> $GITHUB_OUTPUT
            fi
          done < .env

          fetch_ver() {
            curl -sSfL "https://api.github.com/repos/$1/releases/latest" | \
            jq -r '.tag_name // empty' | \
            sed -E 's/^v?([0-9][^"]+).*/\1/'
          }

          for pair in "COSIGN_VERSION:sigstore/cosign" "BUILDX_VERSION:docker/buildx" \
                      "BUILDKIT_VERSION:moby/buildkit" "MINT_VERSION:mintoolkit/mint" \
                      "DIVE_VERSION:wagoodman/dive" "GRYPE_VERSION:anchore/grype" \
                      "SYFT_VERSION:anchore/syft" "TRIVY_VERSION:aquasecurity/trivy" \
                      "CHECKOV_VERSION:bridgecrewio/checkov"; do
            IFS=':' read -r var repo <<< "$pair"
            ver=$(fetch_ver "$repo")
            echo "$var=$ver" >> $GITHUB_OUTPUT
            echo "$var=$ver" >> $GITHUB_ENV
          done

          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_OUTPUT
          echo "VCS_REF=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Login to GHCR🔑
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Setup Docker Buildx🏗️
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
        with:
          version: v${{ env.BUILDX_VERSION }}
          driver-opts: image=moby/buildkit:v${{ env.BUILDKIT_VERSION }}-rootless

      - name: Build Docker image🐳
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_CHECKS_ANNOTATIONS: false
          DOCKER_CONTENT_TRUST: 1
        with:
          provenance: false
          context: .
          file: ./Dockerfile.template
          platforms: linux/amd64
          load: true
          tags: ghcr.io/ammnt/nginx:${{ steps.load_env.outputs.APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_VERSION=${{ steps.load_env.outputs.BASE_VERSION }}
            BASE_HASH=${{ steps.load_env.outputs.BASE_HASH }}
            OPENSSL_VERSION=${{ steps.load_env.outputs.OPENSSL_VERSION }}
            APP_VERSION=${{ steps.load_env.outputs.APP_VERSION }}
            VCS_REF=${{ steps.load_env.outputs.VCS_REF }}
            BUILD_DATE=${{ steps.load_env.outputs.BUILD_DATE }}

      - name: Slim and push image with Mint🔧
        run: |
          curl -sSfL "https://github.com/mintoolkit/mint/releases/download/${{ env.MINT_VERSION }}/dist_linux.tar.gz" | tar -zxf -
          ./dist_linux/mint --quiet build \
            --target ghcr.io/ammnt/nginx:${{ steps.load_env.outputs.APP_VERSION }} \
            --tag ghcr.io/ammnt/nginx:${{ steps.load_env.outputs.APP_VERSION }} \
            --tag ghcr.io/ammnt/nginx:latest \
            --http-probe=false --continue-after=5 \
            --include-path=/etc/shadow --include-path=/etc/group
          docker push ghcr.io/ammnt/nginx --all-tags

      - name: Explore with Dive🔍
        env:
          CI: true
        run: |
          docker pull ghcr.io/ammnt/nginx:${{ steps.load_env.outputs.APP_VERSION }}
          curl -sSfL "https://github.com/wagoodman/dive/releases/download/v${{ env.DIVE_VERSION }}/dive_${{ env.DIVE_VERSION }}_linux_amd64.tar.gz" | tar -zxf -
          ./dive --config ./dive-ci.yml -j dive.report.json ghcr.io/ammnt/nginx:${{ steps.load_env.outputs.APP_VERSION }}

      - name: Upload Mint report📁
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mint-report
          path: slim.report.json

      - name: Upload Dive report📁
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dive-report
          path: dive.report.json

      - name: Get image digest🔢
        id: digest
        run: |
          DIGEST=$(docker inspect -f='{{index .RepoDigests 0}}' ghcr.io/ammnt/nginx:${{ steps.load_env.outputs.APP_VERSION }} | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

  security-scans:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
      packages: write
      id-token: write
    strategy:
      matrix:
        scanner:
          [hadolint, checkov, dockle, scout, trivy, grype, snyk, syft, clair]
      fail-fast: false
    steps:
      - name: Checkout repository📥
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Login to Docker Hub🔑
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Lint Dockerfile with Hadolint🔍
        if: matrix.scanner == 'hadolint'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: Dockerfile.template
          format: sarif
          output-file: hadolint.sarif
          config: ./hadolint.yaml

      - name: Checkov scan🔍
        if: matrix.scanner == 'checkov'
        run: |
          curl -sSfL -o ./checkov_linux_X86_64.zip "https://github.com/bridgecrewio/checkov/releases/download/${{ needs.build.outputs.checkov_version }}/checkov_linux_X86_64.zip"
          unzip -q ./checkov_linux_X86_64.zip
          ./dist/checkov \
            --quiet \
            --output sarif \
            --output-file-path results \
            --framework dockerfile \
            --directory . \
            --dockerfile-path ./Dockerfile.template
          mv results/results_sarif.sarif checkov.sarif

      - name: Dockle scan🛡️
        if: matrix.scanner == 'dockle'
        uses: goodwithtech/dockle-action@e30e6af832aad6ea7dca2a248d31a85eab6dbd68
        with:
          image: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          format: sarif
          exit-code: "1"
          exit-level: "warn"
          ignore: "CIS-DI-0005,CIS-DI-0010"
          output: "dockle.sarif"

      - name: Docker Scout scan🛡️
        if: matrix.scanner == 'scout'
        uses: docker/scout-action@cd72f264beff1cd72735de31148b9d3244a0234a
        with:
          command: cves,sbom
          image: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          sarif-file: scout.sarif
          write-comment: true
          summary: false
          exit-code: true
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Trivy scan🛡️
        if: matrix.scanner == 'trivy'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          scan-type: image
          format: sarif
          output: trivy.sarif
          severity: "MEDIUM,HIGH,CRITICAL"
          scanners: "vuln,secret"
          exit-code: "1"
          github-pat: ${{ secrets.GH_TOKEN }}
          version: v${{ needs.build.outputs.trivy_version }}
          trivy-config: trivy.yaml

      - name: Grype scan🛡️
        if: matrix.scanner == 'grype'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          image: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          fail-build: false
          severity-cutoff: critical
          output-format: sarif
          grype-version: v${{ needs.build.outputs.grype_version }}
          output-file: grype.sarif

      - name: Snyk scan🛡️
        if: matrix.scanner == 'snyk'
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          sarif: true
          args: --file=Dockerfile.template --sarif-file-output=snyk.sarif

      - name: Prepare Clair DB🗄️
        if: matrix.scanner == 'clair'
        continue-on-error: true
        uses: quay/clair-action@e5340cbfbf57d0ee596363fb98fd3d282aa71e17
        with:
          db-file: matcher.db
          mode: update

      - name: Update Clair DB🔄
        if: matrix.scanner == 'clair'
        continue-on-error: true
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: matcher.db
          key: matcher.db

      - name: Clair scan🛡️
        if: matrix.scanner == 'clair'
        continue-on-error: true
        uses: quay/clair-action@e5340cbfbf57d0ee596363fb98fd3d282aa71e17
        with:
          image-ref: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          format: sarif
          output: ./clair.sarif
          db-file: matcher.db

      - name: Generate SBOM with Syft📋
        if: matrix.scanner == 'syft'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          syft-version: v${{ needs.build.outputs.syft_version }}
          image: ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          format: cyclonedx-json
          upload-artifact: true
          dependency-snapshot: true
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Upload ${{ matrix.scanner }} report📁
        if: matrix.scanner != 'syft'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.scanner }}-report
          path: |
            *.sarif
            *.spdx
            *.cyclonedx

      - name: Upload SARIF to Code Scanning🔬
        if: hashFiles('*.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@0c0c5dc2f136b98cb0537075ccfa21f94cd9a63e
        with:
          sarif_file: .
          category: ${{ matrix.scanner }}

  finalize:
    needs: [build, security-scans]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Install Cosign🔐
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: v${{ needs.build.outputs.cosign_version }}

      - name: Login to GHCR🔑
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Login to Docker Hub🔑
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push images to Docker Hub🚚
        run: |
          docker pull ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }}
          docker tag ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }} ammnt/nginx:${{ needs.build.outputs.app_version }}
          docker tag ghcr.io/ammnt/nginx:${{ needs.build.outputs.app_version }} ammnt/nginx:latest
          docker push ammnt/nginx --all-tags

      - name: Attest image provenance📜
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true
          show-summary: false
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Sign container images✍️
        env:
          COSIGN_EXPERIMENTAL: "true"
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign -y --key env://COSIGN_KEY ghcr.io/ammnt/nginx@${{ needs.build.outputs.digest }}
          cosign sign -y --key env://COSIGN_KEY ammnt/nginx@${{ needs.build.outputs.digest }}
          docker system prune -f ; rm -rf ${{ github.workspace }}/*

      - name: Deploy to production server🌐
        continue-on-error: true
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /home/${{ secrets.SERVER_USERNAME }}/agh
            /usr/bin/docker compose pull web dns
            /usr/bin/docker compose up -d web dns

  release:
    needs: [build, security-scans, finalize]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository📥
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Create tagged release🏷️
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ needs.build.outputs.app_version }}
          name: ${{ needs.build.outputs.app_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
