name: LabelerрџЏ·пёЏ
on: [pull_request_target]

jobs:
  label:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d
        with:
          repo-token: "${{ secrets.GH_TOKEN }}"
          sync-labels: true
