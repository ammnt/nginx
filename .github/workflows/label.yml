name: LabelerрџЏ·пёЏ
on: [pull_request_target]

jobs:
  label:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b
        with:
          repo-token: "${{ secrets.GH_TOKEN }}"
          sync-labels: true
